name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY=markbrowse
          if [ "$GOOS" = "windows" ]; then
            BINARY=markbrowse.exe
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${BINARY}" .

      - name: Package artifact
        env:
          GOOS: ${{ matrix.goos }}
        run: |
          BINARY=markbrowse
          if [ "$GOOS" = "windows" ]; then
            BINARY=markbrowse.exe
          fi
          ARCHIVE="markbrowse_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "$ARCHIVE"
          cp "$BINARY" "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE "$ARCHIVE/" 2>/dev/null || true
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: markbrowse_${{ matrix.goos }}_${{ matrix.goarch }}
          path: markbrowse_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets to draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: true
